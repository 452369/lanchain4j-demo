server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
    context-path: /api
langchain4j:
  openai:
    chat-model:
      base-url: https://api.siliconflow.cn/v1
      api-key: yourkey
      model-name: deepseek-ai/DeepSeek-V3
      timeout: 60s
      temperature: 0.7
      max-tokens: 2000
    streaming-chat-model:
      base-url: https://api.siliconflow.cn/v1
      api-key: yourkey
      model-name: deepseek-ai/DeepSeek-V3
      max-tokens: 1000
      timeout: 60s
      temperature: 0.6
    image-model:
      base-url: https://api.siliconflow.cn/v1
      model-name: Kwai-Kolors/Kolors
      api-key: yourkey
      timeout: 60s
    embedding-model:
      base-url: https://api.siliconflow.cn/v1
      model-name: Qwen/Qwen3-Embedding-8B
      api-key: yourkey
      timeout: 60s
bigmodel:
  api-key: yourkey
qdrant:
  host:
  port: 6333
  programming:
    collection-name: programming_kb
  law:
    collection-name: law_kb

logging:
  level:
    dev.langchain4j: DEBUG
    com.ag: INFO